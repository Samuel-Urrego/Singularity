version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"
      runtime-dependencies:
        patterns:
          - "pyodbc*"
          - "pydantic*"
          - "typer*"
          - "tomli*"
